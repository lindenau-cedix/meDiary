services:
  mediary:
    build: .
    image: mediary:latest
    container_name: mediary
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      # SQLite-Datenbank (deine kompletten Daten) — Backup = einfach ./data sichern
      - ./data:/data
      # DEFAULTS.md live editierbar; wird bei jedem Schreibvorgang frisch gelesen
      - ./DEFAULTS.md:/app/DEFAULTS.md
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Optional „von überall" mit HTTPS: Caddy davor (Domain in Caddyfile eintragen,
# reverse_proxy mediary:4000) und mediary aus den ports nehmen. Siehe README.

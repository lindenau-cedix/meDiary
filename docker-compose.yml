services:
  mediary:
    build:
      context: .
      dockerfile: Dockerfile
    image: mediary:local
    container_name: mediary
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_PATH: /data/mediary.db
      WHATSAPP_SESSION_PATH: /data/whatsapp-session
      DEFAULTS_PATH: /data/DEFAULTS.md
      DIARY_PATH: /data/diary.md
      WEB_DIST: /app/web/dist
      DREAM_SYSTEM_PROMPT_PATH: /app/system_prompt.md
      TZ: Europe/Berlin
    ports:
      - "${HOST_PORT:-4000}:4000"
    volumes:
      # ./data:/data persists the live SQLite DB AND the WhatsApp auth credentials (creds.json)
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
